function showTooltipFor(el, rune){
  const t = document.getElementById('tooltip');
  t.innerHTML = `
    <span class="tt-name">${rune.name}</span>
    ${rune.desc}
    <span class="tt-tags">${rune.element.toUpperCase()} · ${rune.shape.toUpperCase()} · PWR ${rune.basePower} · ${rune.rarity.toUpperCase()}</span>
  `;
  t.style.display = 'block';
  const r = el.getBoundingClientRect();
  const tw = t.offsetWidth, th = t.offsetHeight;
  let x = r.left + r.width/2 - tw/2;
  let y = r.top - th - 10;
  if(y < 8) y = r.bottom + 10;
  x = Math.max(8, Math.min(window.innerWidth - tw - 8, x));
  t.style.left = x + 'px';
  t.style.top = y + 'px';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.display = 'none'; }, 2000);
}

function bindLongPress(el, fn){
  let timer;
  const start = ()=>{ timer = setTimeout(fn, 380); };
  const cancel = ()=>{ clearTimeout(timer); };
  el.addEventListener('touchstart', start, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

function gfDamageTier(amount){
  if(amount >= 250) return 4;
  if(amount >= 80)  return 3;
  if(amount >= 25)  return 2;
  return 1;
}
/* screen-level payoff feedback — flash + shake, scaled, all transform/opacity
   so the flex layout never reflows. Silent under prefers-reduced-motion. */
function gfImpact(tier, crit){
  if(gfReducedMotion()) return;
  const big = tier >= 4;
  if(tier >= 3 || crit){
    const fl = document.getElementById('gf-screen-flash');
    if(fl){ fl.classList.remove('fire'); void fl.offsetWidth; fl.classList.add('fire'); }
  }
  const app = document.getElementById('app');
  if(app && (tier >= 3 || crit)){
    const cls = big ? 'gf-shake-2' : 'gf-shake-1';
    app.classList.remove('gf-shake-1','gf-shake-2'); void app.offsetWidth;
    app.classList.add(cls);
    setTimeout(()=>app.classList.remove(cls), big ? 440 : 280);
  }
  gfHaptic(big ? [12,40,18] : tier >= 3 ? 22 : crit ? 16 : 8);
}
function showDamage(amount, crit){
  const stage = document.getElementById('enemy-stage');
  const r = stage.getBoundingClientRect();
  const portrait = document.getElementById('enemy-portrait').getBoundingClientRect();
  const tier = gfDamageTier(amount);
  const pop = document.createElement('div');
  pop.className = 'damage-pop tier-' + tier + (crit ? ' crit' : '');
  pop.textContent = amount;
  pop.style.left = (portrait.left + portrait.width/2 - r.left) + 'px';
  pop.style.top = (portrait.top - r.top + portrait.height/2) + 'px';
  stage.appendChild(pop);
  // count-up: numbers tick up so a big hit feels like it lands hard
  if(!gfReducedMotion() && amount >= 25 && typeof requestAnimationFrame === 'function'){
    const dur = Math.min(480, 240 + tier*70), t0 = (typeof performance!=='undefined'?performance.now():Date.now());
    const step = (now)=>{
      const k = Math.min(1, (now - t0)/dur);
      pop.textContent = Math.round(amount * (1 - Math.pow(1-k, 3)));
      if(k < 1) requestAnimationFrame(step); else pop.textContent = amount;
    };
    requestAnimationFrame(step);
  }
  gfImpact(tier, crit);
  setTimeout(()=>pop.remove(), 1200);
}

/* ----- 13b. LINKS + SHARE (the funnel) -----
   Set GF_LINKS.itch to your itch.io page URL once it exists. While empty,
   the storefront CTAs stay hidden so nothing looks broken at launch. The
   Share button works immediately and is the viral driver to that page. */
const GF_LINKS = {
  itch: ''   // e.g. 'https://stephen.itch.io/glyph-forge'
};
/* Daily streak/score — the retention heartbeat. Records the FIRST result for
   a given Daily date (one attempt, in the spirit of the mode); a consecutive
   calendar day extends the streak, a gap resets it. Deterministic; no RNG. */
function dailyScore(reached, won){ return reached*100 + (won?1500:0); }
function recordDailyResult(seed, reached, won){
  if(!seed || !/^daily-/.test(seed)) return null;
  const date = seed.replace('daily-','');
  const d = state.meta.daily || (state.meta.daily = { lastDate:null, streak:0, bestStreak:0, scores:{} });
  if(d.scores && d.scores[date]) return d;          // one attempt — already logged
  const score = dailyScore(reached, won);
  d.scores = d.scores || {};
  d.scores[date] = { reached, won, score };
  if(d.lastDate){
    const gap = (Date.parse(date) - Date.parse(d.lastDate)) / 86400000;
    d.streak = (gap === 1) ? (d.streak||0) + 1 : 1;
  } else {
    d.streak = 1;
  }
  d.bestStreak = Math.max(d.bestStreak||0, d.streak);
  d.lastDate = date;
  saveState();
  return d;
}
function gfShareText(){
  const res = window._gfResult || {};
  const daily = res.seed && /^daily-/.test(res.seed);
  const tag = daily ? ('Daily Sigil ' + res.seed.replace('daily-','')) : 'a run';
  const line = res.won ? 'inscribed the whole codex — 13/13 ✷'
                       : ('fell at encounter ' + (res.reached || 1) + '/13');
  const d = state.meta.daily || {};
  const extra = daily ? `\nScore ${dailyScore(res.reached||1, !!res.won)}${d.streak?` · ${d.streak}-day streak 🔥`:''}` : '';
  return `Glyph Forge — ${tag}\nI ${line}.${extra}\nFuse runes. Find what shouldn't work.\n${location.origin}${location.pathname}`;
}
async function gfShare(){
  const text = gfShareText();
  if(navigator.share){
    try{ await navigator.share({ title:'Glyph Forge', text }); }catch(e){}
    return;
  }
  try{
    await navigator.clipboard.writeText(text);
    gfToast('Result copied — paste it anywhere');
  }catch(e){
    window.prompt('Copy your result:', text);
  }
}

/* Tap-tooltips: title= never fires on touch, so depth chips / stats with
   [data-tip] were invisible on phones (a real bug). Tap a chip to toggle its
   explanation; tap anywhere else to dismiss. Guarded so the Node test/sim
   stubs (no document.addEventListener) skip it entirely. */
if(typeof document !== 'undefined' && typeof document.addEventListener === 'function'){
  const tip = document.createElement('div');
  tip.id = 'gf-tip';
  document.body.appendChild(tip);
  let tipFor = null;
  function hideTip(){
    tip.classList.remove('show');
    if(tipFor){ tipFor.classList.remove('gf-tip-open'); tipFor = null; }
  }
  function showTip(el){
    const text = el.getAttribute('data-tip');
    if(!text){ hideTip(); return; }
    if(tipFor) tipFor.classList.remove('gf-tip-open');
    tip.textContent = text;
    tip.classList.add('show');
    el.classList.add('gf-tip-open');
    tipFor = el;
    const r = el.getBoundingClientRect();
    const tw = tip.offsetWidth, th = tip.offsetHeight;
    let left = r.left + r.width/2 - tw/2;
    left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
    let top = r.bottom + 8;
    if(top + th > window.innerHeight - 8) top = r.top - th - 8;
    tip.style.left = left + 'px';
    tip.style.top = Math.max(8, top) + 'px';
  }
  document.addEventListener('click', (e)=>{
    const el = e.target && e.target.closest && e.target.closest('[data-tip]');
    if(el){
      if(tipFor === el){ hideTip(); }
      else { showTip(el); }
    } else {
      hideTip();
    }
  }, true);
  window.addEventListener('scroll', hideTip, true);
  window.addEventListener('resize', hideTip);
}

/* ===== DEV SANDBOX — gated; inert for normal players ======================
   Toggle: backtick key (`) or click the tiny "⚙ dev" badge (bottom-left).
   Active only on localhost / *.app.github.dev, OR if you run
   localStorage.gfDev='1' once on any host. Real players never see it. */
(function(){
  let GF_DEV=false;
  try{
    const h=location.hostname;
    GF_DEV = h===''||h==='localhost'||h==='127.0.0.1'
      || /\.app\.github\.dev$/.test(h) || /\.github\.dev$/.test(h)
      || /\.gitpod\.io$/.test(h) || localStorage.getItem('gfDev')==='1';
  }catch(e){}
  if(!GF_DEV) return;

  const css=`
  #gf-badge{position:fixed;left:2px;top:50%;transform:translateY(-50%);z-index:99998;font:10px/1 monospace;
   color:#d4a849;background:rgba(10,7,5,.8);border:1px solid #5a4a2e;border-radius:4px;
   padding:5px 8px;cursor:pointer;opacity:.5;letter-spacing:.08em;user-select:none}
  #gf-badge:hover{opacity:1}
  #gf-panel{position:fixed;left:8px;right:8px;bottom:40px;max-height:72vh;overflow:auto;
   z-index:99999;display:none;background:rgba(8,6,4,.97);border:1px solid #6b1d1d;
   border-radius:6px;color:#e8dcc3;font:12px/1.45 monospace;padding:12px;box-shadow:0 10px 40px #000}
  #gf-panel.open{display:block}
  #gf-panel h4{margin:12px 0 6px;color:#f0c46a;font-size:11px;letter-spacing:.12em;
   text-transform:uppercase;border-bottom:1px solid #3a2e1c;padding-bottom:3px}
  #gf-panel h4:first-child{margin-top:0}
  #gf-panel button{background:#1f1810;color:#e8dcc3;border:1px solid #5a4a2e;border-radius:3px;
   padding:5px 8px;margin:2px;cursor:pointer;font:11px monospace}
  #gf-panel button:hover{border-color:#d4a849;color:#f0c46a}
  #gf-panel button.q{background:#2a1414;border-color:#6b1d1d}
  #gf-panel input{width:64px;background:#14100b;color:#e8dcc3;border:1px solid #5a4a2e;
   border-radius:3px;padding:4px;font:11px monospace}
  #gf-panel .grid{display:flex;flex-wrap:wrap;gap:2px}
  #gf-panel .rar{color:#8a7a5e;width:100%;margin-top:4px}
  #gf-bd{white-space:pre;background:#0f0c08;border:1px solid #3a2e1c;border-radius:3px;
   padding:8px;margin-top:4px;font-size:11px;color:#c9b896}
  #gf-bd b{color:#f0c46a}
  #gf-x{float:right;color:#a83232;cursor:pointer}`;
  const st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  const badge=document.createElement('div'); badge.id='gf-badge'; badge.textContent='⚙ dev';
  const panel=document.createElement('div'); panel.id='gf-panel';
  document.body.appendChild(badge); document.body.appendChild(panel);

  let open=false,timer=null;
  function ensureRun(){ if(!state.run) startNewRun(); showScreen('game-screen'); }
  function num(id){ const v=parseInt((document.getElementById(id)||{}).value,10); return isNaN(v)?null:v; }
  function fmt(n){ return Math.round(n*100)/100; }
  function rebuild(){
    const rar={common:[],uncommon:[],rare:[],mythic:[]};
    RUNES.forEach(r=>{ (rar[r.rarity]=rar[r.rarity]||[]).push(r); });
    const runeBtns=Object.keys(rar).map(k=>`<div class="rar">${k}</div><div class="grid">`+
      rar[k].map(r=>`<button data-rune="${r.id}">${r.name}</button>`).join('')+`</div>`).join('');
    const encBtns=Array.from({length:13},(_,i)=>`<button data-enc="${i}">${i+1}${i===12?'★':''}</button>`).join('');
    panel.innerHTML=`<span id="gf-x">✕ close</span><h4>Run</h4>`+
      `<button class="q" data-act="newrun">New run</button>`+
      `<button class="q" data-act="newdaily">New daily</button>`+
      `<h4>Jump to encounter (★=boss, sets fluency to match)</h4><div class="grid">${encBtns}</div>`+
      `<h4>Player</h4><button data-act="fullhp">Full HP</button> HP <input id="gf-hp" type="number">`+
      ` <button data-act="sethp">set</button> &nbsp; fluency <input id="gf-fl" type="number">`+
      ` <button data-act="setfl">set</button>`+
      `<h4>Enemy</h4>enemy HP <input id="gf-ehp" type="number"> <button data-act="setehp">set</button>`+
      ` <button class="q" data-act="kill">Defeat enemy →</button>`+
      `<h4>Add rune to hand</h4>${runeBtns}`+
      `<h4>Codex</h4><button data-act="revealcombos">Reveal all combos</button>`+
      `<button class="q" data-act="wipecodex">Wipe codex</button>`+
      `<h4>Live damage breakdown</h4><div id="gf-bd">build a spell to see the math</div>`;
  }
  function act(a){
    if(a==='newrun'){ startNewRun(); showScreen('game-screen'); }
    else if(a==='newdaily'){ startNewRun('daily-'+new Date().toISOString().slice(0,10)); showScreen('game-screen'); }
    else if(a==='fullhp'){ ensureRun(); state.run.hp=state.run.maxHp; saveState(); renderGame(); }
    else if(a==='sethp'){ ensureRun(); const v=num('gf-hp'); if(v!=null){ state.run.hp=Math.max(1,Math.min(state.run.maxHp,v)); saveState(); renderGame(); } }
    else if(a==='setfl'){ ensureRun(); const v=num('gf-fl'); if(v!=null){ state.run.fluency=Math.max(0,v); saveState(); renderGame(); } }
    else if(a==='setehp'){ ensureRun(); const v=num('gf-ehp'); if(v!=null){ state.run.enemyHp=Math.max(0,v); saveState(); renderGame(); } }
    else if(a==='kill'){ ensureRun(); state.run.enemyHp=0; saveState(); renderGame();
      if(state.run.encounterIdx===12) onVictory(); else onEnemyDefeated(); }
    else if(a==='revealcombos'){ NAMED_COMBOS.forEach(c=>{ if(!state.meta.discoveredCombos[c.id])
      state.meta.discoveredCombos[c.id]={name:c.name,peakDamage:0,runeIds:[],firstSeen:Date.now()}; });
      saveState(); if(document.getElementById('codex-screen').classList.contains('active')) renderCodex(); }
    else if(a==='wipecodex'){ state.meta.discoveredCombos={}; state.meta.discoveredRunes=[]; saveState();
      if(document.getElementById('codex-screen').classList.contains('active')) renderCodex(); }
  }
  panel.addEventListener('click',e=>{
    const t=e.target;
    if(t.id==='gf-x'){ toggle(false); return; }
    if(t.dataset.act){ act(t.dataset.act); }
    else if(t.dataset.enc!=null){ ensureRun(); const i=+t.dataset.enc;
      state.run.encounterIdx=i; state.run.fluency=i; beginEncounter(); showScreen('game-screen'); }
    else if(t.dataset.rune){ ensureRun(); state.run.hand.push(t.dataset.rune); saveState(); renderGame(); }
  });
  function refreshBD(){
    const bd=document.getElementById('gf-bd'); if(!bd) return;
    if(!state.run){ bd.textContent='no active run'; return; }
    let res=null; try{ res=resolveSpell(); }catch(e){ bd.textContent='—'; return; }
    if(!res||!res.trace){ bd.textContent='build a spell to see the math'; return; }
    const tr=res.trace;
    let s=tr.perRune.map(p=>`${(p.name||'').padEnd(12)} (${p.base}+${p.add})×${fmt(p.mult)}×${p.repeats} = ${fmt(p.sub)}`).join('\n');
    if(tr.pandemoniumBonus) s+=`\n+ pandemonium hand   = ${tr.pandemoniumBonus}`;
    s+=`\nPOWER (base sum)     = ${fmt(tr.baseSum)}`;
    if(tr.globalMult!==1) s+=`\n× global mult        ×${fmt(tr.globalMult)}`;
    s+=`\n× XMULT              ×${fmt(tr.xmult)}   (elem ×${fmt(tr.elementMult)} · shape ×${fmt(tr.shapeMult)} · order)`;
    if(tr.spellRetrigger) s+=`\n× retrigger          ×${fmt(1+tr.spellRetrigger)}`;
    s+=`\n× fluency            ×${fmt(tr.fluencyMult)}`;
    s+=`\n= ${fmt(tr.preFloor)}  →  FINAL ${tr.final}`;
    if(res.comboMatch) s+=`\ncombo → ${res.comboMatch.name}`;
    bd.innerHTML=`<b>${tr.final}</b> damage\n`+s;
  }
  function toggle(v){
    open=(v===undefined)?!open:v;
    if(open){ rebuild(); panel.classList.add('open'); refreshBD(); timer=setInterval(refreshBD,180); }
    else { panel.classList.remove('open'); clearInterval(timer); }
  }
  badge.addEventListener('click',()=>toggle());
  window.addEventListener('keydown',e=>{ if(e.key==='`'||e.key==='~'){ e.preventDefault(); toggle(); } });
  console.log('%cGlyph Forge DEV sandbox — press ` (backtick) or click ⚙ dev (bottom-left)','color:#d4a849;font-weight:bold');
})();
</script>
