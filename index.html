<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d0a08" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Glyph Forge</title>
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     GLYPH FORGE — Aesthetic: illuminated manuscript / dark codex
     Palette locked. Edit CSS vars to retheme.
     ============================================================ */
  :root {
    --ink-deep:     #0a0705;
    --ink-mid:      #14100b;
    --ink-warm:     #1f1810;
    --parchment:    #e8dcc3;
    --parchment-dk: #c9b896;
    --parchment-sh: #8a7a5e;
    --gilt:         #d4a849;
    --gilt-bright:  #f0c46a;
    --verdigris:    #5a8d6a;
    --crimson:      #a83232;
    --crimson-dk:   #6b1d1d;
    --violet:       #6b4d8c;
    --vellum:       #f4e8d0;
    --shadow:       rgba(0,0,0,0.65);
    --grain:        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.85  0 0 0 0 0.78  0 0 0 0 0.6  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--ink-deep);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 16px;
    line-height: 1.4;
    overflow: hidden;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  body {
    background:
      radial-gradient(ellipse at top, rgba(212,168,73,0.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(107,77,140,0.06), transparent 70%),
      var(--ink-deep);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: var(--grain);
    opacity: 0.5;
    pointer-events: none;
    mix-blend-mode: overlay;
    z-index: 1;
  }

  #app {
    position: relative;
    width: 100vw; height: 100vh;
    height: 100dvh;
    max-width: 540px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }

  /* ============ SCREENS ============ */
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  /* ============ TITLE SCREEN ============ */
  #title-screen {
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
  }
  .title-mark {
    width: 200px; height: 200px;
    margin-bottom: 24px;
    background: var(--ink-mid);
    border: 1px solid var(--gilt);
    border-radius: 50%;
    display: grid; place-items: center;
    position: relative;
    box-shadow:
      0 0 60px rgba(212,168,73,0.25),
      inset 0 0 40px rgba(212,168,73,0.1);
  }
  .title-mark::after {
    content: '';
    position: absolute; inset: 8px;
    border: 1px solid var(--gilt);
    border-radius: 50%;
    opacity: 0.4;
  }
  .title-mark img {
    width: 70%; height: 70%;
    object-fit: contain;
    filter: drop-shadow(0 0 20px var(--gilt));
  }
  .title-mark.placeholder::before {
    content: '✶';
    font-size: 100px;
    color: var(--gilt);
    text-shadow: 0 0 30px var(--gilt-bright);
  }
  h1.title {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: 44px;
    letter-spacing: 0.1em;
    color: var(--gilt);
    margin: 0 0 8px;
    text-shadow: 0 0 30px rgba(212,168,73,0.5);
  }
  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--parchment-dk);
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    max-width: 280px;
  }
  .title-meta {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 6px 8px; max-width: 340px; margin-bottom: 26px;
  }
  .title-meta:empty { display: none; }
  .tm-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.04em; color: var(--parchment-sh);
    border: 1px solid rgba(212,168,73,0.22); border-radius: 3px;
    padding: 4px 8px; cursor: help;
  }
  .tm-chip b { color: var(--gilt-bright); font-weight: 700; }
  /* Ascension picker (Sigil modal) */
  .asc-picker {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin: 4px 0 14px; padding: 10px;
    border: 1px solid rgba(168,50,50,0.3); border-radius: 4px;
    background: rgba(168,50,50,0.06);
  }
  .asc-picker button {
    width: 34px; height: 34px; font-size: 18px; line-height: 1;
    background: var(--ink-warm); color: var(--gilt);
    border: 1px solid var(--gilt); border-radius: 4px; cursor: pointer;
  }
  .asc-picker button:disabled { opacity: 0.3; cursor: default; }
  .asc-picker .asc-info { flex: 1; text-align: center; }
  .asc-picker .asc-name {
    font-family: 'Cinzel Decorative', serif; font-size: 14px; color: var(--gilt-bright);
  }
  .asc-picker .asc-blurb {
    font-family: 'IM Fell English', serif; font-style: italic;
    font-size: 12px; color: var(--parchment-dk); margin-top: 2px;
  }
  .menu-buttons {
    display: flex; flex-direction: column;
    gap: 14px; width: 100%; max-width: 320px;
  }

  /* ============ BUTTONS ============ */
  button.btn {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.18em;
    color: var(--parchment);
    background: linear-gradient(to bottom, var(--ink-warm), var(--ink-mid));
    border: 1px solid var(--gilt);
    border-radius: 2px;
    padding: 16px 24px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
    box-shadow: 0 2px 0 var(--ink-deep), 0 4px 12px rgba(0,0,0,0.4);
    min-height: 50px;
  }
  button.btn::before, button.btn::after {
    content: '';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 12px; height: 12px;
    border: 1px solid var(--gilt);
    opacity: 0.6;
  }
  button.btn::before { left: 8px; border-right: 0; border-bottom: 0; }
  button.btn::after  { right: 8px; border-left: 0; border-top: 0; }
  button.btn:active {
    transform: translateY(1px);
    box-shadow: 0 0 0 var(--ink-deep), 0 2px 8px rgba(0,0,0,0.4);
  }
  button.btn.primary {
    background: linear-gradient(to bottom, #2a1f10, var(--ink-warm));
    color: var(--gilt-bright);
    border-color: var(--gilt-bright);
  }
  button.btn.danger { color: var(--crimson); border-color: var(--crimson-dk); }
  button.btn:disabled { opacity: 0.35; cursor: not-allowed; }
  button.btn.small { padding: 8px 14px; font-size: 12px; min-height: 36px; }
  .gf-itch-link {
    display: inline-block; margin-top: 18px;
    color: var(--gilt); text-decoration: none;
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    opacity: 0.72; transition: opacity 0.2s, color 0.2s;
    border-bottom: 1px solid rgba(212,168,73,0.35); padding-bottom: 2px;
  }
  .gf-itch-link:hover { opacity: 1; color: var(--gilt-bright); }
  .gf-toast {
    position: fixed; left: 50%; bottom: 7%; transform: translateX(-50%);
    background: var(--ink-warm); color: var(--parchment);
    border: 1px solid var(--gilt); border-radius: 4px;
    padding: 10px 18px; font-size: 13px; letter-spacing: 0.04em;
    box-shadow: 0 6px 24px var(--shadow); z-index: 9999;
    animation: gf-toast-in 0.25s ease-out;
  }
  @keyframes gf-toast-in { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
  button.btn.icon {
    padding: 8px; min-height: 36px; min-width: 36px;
    font-size: 14px;
  }

  /* ============ GAME SCREEN ============ */
  #game-screen { padding: 0; }

  .hud {
    display: flex;
    flex-shrink: 0;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    padding-top: max(12px, env(safe-area-inset-top));
    border-bottom: 1px solid rgba(212,168,73,0.2);
    background: var(--ink-deep);
  }
  .hud-depth {
    flex-shrink: 0;
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px 10px;
    padding: 5px 16px;
    background: var(--ink-mid);
    border-bottom: 1px solid rgba(212,168,73,0.12);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.06em;
    color: var(--parchment-sh);
  }
  .hud-depth .dchip { color: var(--gilt); }
  .hud-depth .dchip b { color: var(--gilt-bright); font-weight: 700; }
  .hud-depth .dchip.dim { color: var(--parchment-sh); }
  .hud-depth .dprophecy.done { color: var(--verdigris); }
  /* tap-tooltip: title= is dead on touch — these chips are tappable */
  .hud-depth .dchip[data-tip], .hud-stat[data-tip] { cursor: help; }
  .hud-depth .dchip[data-tip]::after {
    content: ''; display: inline-block; width: 11px; height: 11px;
    margin-left: 4px; vertical-align: -1px; opacity: 0.5;
    border: 1px solid currentColor; border-radius: 50%;
    background: radial-gradient(circle at 50% 42%, currentColor 0 1px, transparent 1.5px);
  }
  .dchip.gf-tip-open { outline: 1px solid var(--gilt); outline-offset: 1px; }
  /* relic rarity tokens */
  .rtok { display:inline-block; width:6px; height:6px; margin-left:4px;
    border-radius:50%; vertical-align:1px; }
  .rtok.r-common   { background: var(--parchment-sh); }
  .rtok.r-uncommon { background: var(--verdigris); }
  .rtok.r-rare     { background: var(--violet); box-shadow: 0 0 5px var(--violet); }
  .rtok.r-mythic   { background: var(--crimson); box-shadow: 0 0 6px var(--crimson); }
  #gf-tip {
    position: fixed; z-index: 120; max-width: 76vw;
    background: var(--ink-deep); color: var(--parchment);
    border: 1px solid var(--gilt);
    box-shadow: 0 6px 24px rgba(0,0,0,0.7), 0 0 16px rgba(212,168,73,0.25);
    padding: 9px 12px; border-radius: 4px;
    font-family: 'Cormorant Garamond', serif; font-size: 14px; line-height: 1.35;
    pointer-events: none; opacity: 0; transform: translateY(4px);
    transition: opacity 0.14s ease, transform 0.14s ease;
  }
  #gf-tip.show { opacity: 1; transform: translateY(0); }
  .hud-left, .hud-right { display: flex; align-items: center; gap: 10px; }
  .hud-stat {
    font-family: 'IM Fell English', serif;
    color: var(--parchment-dk);
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .hud-stat strong {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gilt-bright);
    font-weight: 700;
    margin-left: 4px;
  }
  .hp-bar {
    width: 80px; height: 8px;
    background: var(--ink-warm);
    border: 1px solid var(--parchment-sh);
    border-radius: 1px;
    overflow: hidden;
    position: relative;
  }
  .hp-bar > div {
    height: 100%;
    background: linear-gradient(to right, var(--crimson-dk), var(--crimson));
    transition: width 0.4s ease-out;
  }

  /* ----- Enemy region ----- */
  .enemy-stage {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 16px;
    background:
      radial-gradient(ellipse at center, rgba(168,50,50,0.08), transparent 70%),
      var(--ink-deep);
  }
  .enemy {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    text-align: center;
  }
  .enemy-portrait {
    width: clamp(96px, 22vh, 180px);
    height: clamp(96px, 22vh, 180px);
    flex-shrink: 0;
    border-radius: 50%;
    background: var(--ink-warm);
    border: 1px solid var(--crimson-dk);
    display: grid; place-items: center;
    position: relative;
    box-shadow:
      0 0 40px rgba(168,50,50,0.3),
      inset 0 0 30px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .enemy-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: contrast(1.1) brightness(0.9);
  }
  .enemy-portrait.placeholder::after {
    content: '⌬';
    font-size: clamp(48px, 12vh, 90px);
    color: var(--crimson);
    text-shadow: 0 0 30px var(--crimson);
  }
  .enemy-portrait.hit {
    animation: shake 0.4s, flash 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(3px); }
  }
  @keyframes flash {
    0%, 100% { filter: none; }
    30% { filter: brightness(2) saturate(0.5); }
  }
  .enemy-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 20px;
    color: var(--parchment);
    letter-spacing: 0.12em;
  }
  .enemy-hp-row {
    display: flex; align-items: center; gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--crimson);
  }
  .enemy-hp-bar {
    width: 160px; height: 12px;
    background: var(--ink-warm);
    border: 1px solid var(--crimson-dk);
    overflow: hidden;
    position: relative;
  }
  .enemy-hp-bar > div {
    position: absolute; left: 0; top: 0;
    height: 100%;
  }
  /* chip damage: a pale ghost that lags the red fill, then catches up */
  #enemy-hp-ghost {
    background: rgba(240, 196, 106, 0.55);
    transition: width 0.65s ease-out 0.18s;
  }
  #enemy-hp-fill {
    background: linear-gradient(to right, var(--crimson), var(--crimson-dk));
    transition: width 0.28s ease-out;
  }
  .threat-meter {
    display: flex; gap: 4px; margin-top: 4px;
  }
  .threat-pip {
    width: 10px; height: 10px;
    border: 1px solid var(--crimson-dk);
    background: var(--ink-deep);
    transform: rotate(45deg);
  }
  .threat-pip.active { background: var(--crimson); box-shadow: 0 0 6px var(--crimson); }

  /* Floating damage numbers */
  .damage-pop {
    position: absolute;
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: 38px;
    color: var(--gilt-bright);
    text-shadow:
      0 0 10px var(--gilt),
      0 2px 0 var(--ink-deep),
      0 4px 12px rgba(0,0,0,0.8);
    pointer-events: none;
    animation: damageFloat 1.2s cubic-bezier(0.2, 0.6, 0.3, 1) forwards;
    z-index: 50;
  }
  .damage-pop.crit {
    color: var(--crimson);
    font-size: 52px;
  }
  @keyframes damageFloat {
    0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -120px) scale(0.9); opacity: 0; }
  }
  /* magnitude tiers — bigger hits read bigger & hotter */
  .damage-pop.tier-1 { font-size: 30px; }
  .damage-pop.tier-2 { font-size: 40px; }
  .damage-pop.tier-3 { font-size: 54px; color: var(--gilt-bright);
    text-shadow: 0 0 16px var(--gilt), 0 0 34px var(--gilt), 0 2px 0 var(--ink-deep); }
  .damage-pop.tier-4 { font-size: 70px; color: #ffe6a0;
    text-shadow: 0 0 22px var(--gilt-bright), 0 0 48px var(--crimson), 0 2px 0 var(--ink-deep); }
  .damage-pop.crit { color: var(--crimson); }
  .damage-pop.crit.tier-3, .damage-pop.crit.tier-4 {
    color: #ff7a5c; text-shadow: 0 0 24px var(--crimson), 0 0 52px var(--crimson); }

  /* full-viewport flash on big payoffs (inert under reduced-motion) */
  #gf-screen-flash {
    position: fixed; inset: 0; z-index: 90;
    pointer-events: none; opacity: 0;
    background: radial-gradient(ellipse at center, rgba(240,196,106,0.42), rgba(168,50,50,0.10) 60%, transparent 75%);
  }
  #gf-screen-flash.fire { animation: gfFlash 0.42s ease-out; }
  @keyframes gfFlash { 0% { opacity: 0; } 18% { opacity: 1; } 100% { opacity: 0; } }

  /* screen shake — transform only, never reflows the flex layout */
  #app.gf-shake-1 { animation: gfShake1 0.26s ease-in-out; }
  #app.gf-shake-2 { animation: gfShake2 0.42s ease-in-out; }
  @keyframes gfShake1 {
    0%,100% { transform: translate(0,0); }
    25% { transform: translate(-3px,1px); } 50% { transform: translate(3px,-1px); }
    75% { transform: translate(-2px,1px); }
  }
  @keyframes gfShake2 {
    0%,100% { transform: translate(0,0); }
    15% { transform: translate(-7px,2px); } 30% { transform: translate(6px,-3px); }
    45% { transform: translate(-6px,2px); } 60% { transform: translate(5px,-2px); }
    80% { transform: translate(-3px,1px); }
  }
  /* readout "heat": the live damage preview warms as it climbs */
  .spell-damage.heat-2 { color: #ffd97a; text-shadow: 0 0 8px rgba(240,196,106,0.6); }
  .spell-damage.heat-3 { color: #ffb15c; text-shadow: 0 0 12px rgba(240,160,90,0.8); }
  .spell-damage.heat-4 { color: #ff7a5c;
    text-shadow: 0 0 14px var(--crimson), 0 0 26px rgba(168,50,50,0.7); }

  /* ----- Spell slots ----- */
  .spell-area {
    flex-shrink: 0;
    padding: 12px 16px;
    background: var(--ink-mid);
    border-top: 1px solid rgba(212,168,73,0.15);
    border-bottom: 1px solid rgba(212,168,73,0.15);
  }
  .spell-readout {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
    font-family: 'IM Fell English', serif;
    color: var(--parchment-dk);
    font-size: 13px;
    letter-spacing: 0.08em;
    font-style: italic;
  }
  .spell-damage {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--gilt-bright);
    letter-spacing: 0.1em;
  }
  .spell-slots {
    display: flex; gap: 8px; justify-content: center;
  }
  .spell-slot {
    flex: 1;
    aspect-ratio: 1;
    max-width: 90px;
    border: 1px dashed var(--parchment-sh);
    background: rgba(0,0,0,0.4);
    border-radius: 4px;
    display: grid; place-items: center;
    color: var(--parchment-sh);
    font-family: 'Cinzel Decorative', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .spell-slot.filled {
    border-style: solid;
    border-color: var(--gilt);
    background: var(--ink-warm);
    cursor: pointer;
  }
  .spell-slot.gf-fill { animation: gfSlotFill 0.32s cubic-bezier(0.2,0.7,0.3,1.2); }
  @keyframes gfSlotFill {
    0%   { transform: scale(0.7); opacity: 0.2; }
    60%  { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); }
  }
  .spell-slot.synergy-element { box-shadow: 0 0 0 1px var(--verdigris), 0 0 12px rgba(90,141,106,0.4); animation: gfThrobV 1.5s ease-in-out infinite; }
  .spell-slot.synergy-shape { box-shadow: 0 0 0 1px var(--violet), 0 0 12px rgba(107,77,140,0.4); animation: gfThrobP 1.5s ease-in-out infinite; }
  .spell-slot.synergy-both {
    box-shadow:
      0 0 0 1px var(--gilt-bright),
      0 0 16px rgba(240,196,106,0.5);
    animation: gfThrobG 1.3s ease-in-out infinite;
  }
  @keyframes gfThrobV { 0%,100% { box-shadow: 0 0 0 1px var(--verdigris), 0 0 10px rgba(90,141,106,0.35); } 50% { box-shadow: 0 0 0 1px var(--verdigris), 0 0 20px rgba(90,141,106,0.7); } }
  @keyframes gfThrobP { 0%,100% { box-shadow: 0 0 0 1px var(--violet), 0 0 10px rgba(107,77,140,0.35); } 50% { box-shadow: 0 0 0 1px var(--violet), 0 0 20px rgba(107,77,140,0.7); } }
  @keyframes gfThrobG { 0%,100% { box-shadow: 0 0 0 1px var(--gilt-bright), 0 0 14px rgba(240,196,106,0.4); } 50% { box-shadow: 0 0 0 1px var(--gilt-bright), 0 0 26px rgba(240,196,106,0.8); } }

  /* ----- Hand area ----- */
  .hand-area {
    flex-shrink: 0;
    padding: 12px 12px;
    background: var(--ink-deep);
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .hand-label {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px;
  }
  .hand-label span {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment-dk);
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .hand-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    flex: 1;
  }

  /* ----- Rune card ----- */
  .rune {
    aspect-ratio: 5/7;
    background: linear-gradient(135deg, var(--vellum), var(--parchment-dk));
    border: 1px solid var(--gilt);
    border-radius: 3px;
    padding: 4px;
    display: flex; flex-direction: column;
    color: var(--ink-deep);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px var(--shadow), inset 0 0 12px rgba(139,109,68,0.15);
    overflow: hidden;
  }
  .rune::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--grain);
    opacity: 0.4;
    pointer-events: none;
    mix-blend-mode: multiply;
  }
  .rune:active { transform: translateY(2px) scale(0.97); }
  .rune.placed { opacity: 0.3; pointer-events: none; }
  .rune.rarity-uncommon { border-color: var(--verdigris); }
  .rune.rarity-rare     { border-color: var(--violet); box-shadow: 0 2px 6px var(--shadow), 0 0 12px rgba(107,77,140,0.3), inset 0 0 12px rgba(107,77,140,0.1); }
  .rune.rarity-mythic   { border-color: var(--crimson); box-shadow: 0 2px 6px var(--shadow), 0 0 18px rgba(168,50,50,0.4), inset 0 0 14px rgba(168,50,50,0.15); }

  .rune-art {
    flex: 1;
    background: var(--ink-warm);
    border: 1px solid var(--parchment-sh);
    border-radius: 2px;
    display: grid; place-items: center;
    overflow: hidden;
    position: relative;
    margin-bottom: 3px;
  }
  .rune-art img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .rune-art.placeholder::after {
    content: attr(data-glyph);
    font-family: 'Cinzel Decorative', serif;
    font-size: 28px;
    color: var(--gilt);
    text-shadow: 0 0 8px var(--gilt);
  }
  .rune-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-align: center;
    color: var(--ink-warm);
    line-height: 1.1;
    text-transform: uppercase;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .rune-stats {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--ink-warm);
    padding: 0 2px;
  }
  .rune-stat-power {
    font-weight: 700;
    color: var(--crimson);
  }
  .rune-element-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 2px;
    vertical-align: middle;
  }

  /* Element colors (small visual indicators) */
  .el-fire    { background: #d4633a; }
  .el-water   { background: #3a7dd4; }
  .el-earth   { background: #8a6b3a; }
  .el-air     { background: #c4d4e0; }
  .el-void    { background: #2a2030; }
  .el-light   { background: #f0e0a0; box-shadow: 0 0 4px #f0e0a0; }
  .el-shadow  { background: #1a1015; }
  .el-order   { background: #d4a849; }
  .el-chaos   { background: #b03a8a; }

  /* ----- Cast button ----- */
  .cast-row {
    display: flex; gap: 8px;
    flex-shrink: 0;
    padding: 8px 16px 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--ink-deep);
    border-top: 1px solid rgba(212,168,73,0.15);
  }
  .cast-row button { flex: 1; }
  .cast-row button.cast {
    font-size: 18px;
    background: linear-gradient(to bottom, var(--crimson-dk), #4a1414);
    color: var(--gilt-bright);
    border-color: var(--gilt);
  }
  .cast-row button.cast:not(:disabled) {
    animation: pulseGlow 2.2s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 2px 0 var(--ink-deep), 0 0 0 rgba(212,168,73,0); }
    50% { box-shadow: 0 2px 0 var(--ink-deep), 0 0 20px rgba(212,168,73,0.4); }
  }

  /* ============ MODAL / OVERLAY ============ */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(10,7,5,0.92);
    z-index: 100;
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .modal-bg.active { display: flex; animation: gfModalBg 0.22s ease-out; }
  @keyframes gfModalBg { from { opacity: 0; } to { opacity: 1; } }
  .modal-bg.active .modal { animation: gfModalIn 0.28s cubic-bezier(0.2,0.7,0.3,1.15); }
  @keyframes gfModalIn {
    0% { opacity: 0; transform: translateY(14px) scale(0.94); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal {
    background: var(--ink-mid);
    border: 1px solid var(--gilt);
    border-radius: 4px;
    padding: 28px 24px;
    max-width: 380px; width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 0 50px rgba(212,168,73,0.2), 0 12px 40px var(--shadow);
    position: relative;
  }
  .modal::before, .modal::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border: 1px solid var(--gilt);
  }
  .modal::before { top: 6px; left: 6px; border-right: 0; border-bottom: 0; }
  .modal::after  { bottom: 6px; right: 6px; border-left: 0; border-top: 0; }
  .modal h2 {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    color: var(--gilt);
    letter-spacing: 0.12em;
    font-size: 22px;
    margin: 0 0 8px;
  }
  .modal p {
    font-family: 'IM Fell English', serif;
    color: var(--parchment-dk);
    font-style: italic;
    margin: 0 0 18px;
  }
  .modal .choices {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 16px;
  }
  .modal .reward-rune {
    display: flex; gap: 10px;
    background: var(--ink-warm);
    border: 1px solid var(--parchment-sh);
    border-radius: 3px;
    padding: 12px;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .modal .reward-rune:active { transform: scale(0.97); }
  .modal .reward-rune:hover, .modal .reward-rune:active {
    border-color: var(--gilt);
  }
  .modal .reward-rune .rune {
    width: 60px;
    min-width: 60px;
    aspect-ratio: 5/7;
  }
  .modal .reward-rune-info {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 4px;
  }
  .modal .reward-rune-info .name {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    color: var(--gilt-bright);
    font-size: 14px;
    letter-spacing: 0.06em;
  }
  .modal .reward-rune-info .desc {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment-dk);
    font-size: 12px;
    line-height: 1.3;
  }
  .modal .reward-rune-info .tags {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--parchment-sh);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ============ TOOLTIP ============ */
  .tooltip {
    position: fixed;
    background: var(--ink-deep);
    border: 1px solid var(--gilt);
    padding: 8px 12px;
    border-radius: 3px;
    max-width: 240px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment);
    font-size: 13px;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 8px 24px var(--shadow);
    line-height: 1.4;
  }
  .tooltip .tt-name {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 700;
    color: var(--gilt);
    font-style: normal;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: block;
  }
  .tooltip .tt-tags {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--parchment-sh);
    font-style: normal;
    margin-top: 4px;
    display: block;
    letter-spacing: 0.05em;
  }

  /* ============ CODEX / META SCREENS ============ */
  #codex-screen, #map-screen { padding: 20px 16px; overflow-y: auto; }
  .codex-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
    padding-top: env(safe-area-inset-top);
  }
  .codex-header h2 {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gilt);
    letter-spacing: 0.12em;
    margin: 0;
    font-size: 22px;
  }
  .codex-stats {
    display: flex; gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .codex-stat {
    flex: 1;
    min-width: 100px;
    background: var(--ink-mid);
    border: 1px solid var(--parchment-sh);
    padding: 10px;
    text-align: center;
  }
  .codex-stat .label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment-sh);
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .codex-stat .value {
    font-family: 'JetBrains Mono', monospace;
    color: var(--gilt-bright);
    font-size: 24px;
    font-weight: 700;
  }
  .codex-section-title {
    font-family: 'Cinzel Decorative', serif;
    color: var(--parchment-dk);
    letter-spacing: 0.1em;
    font-size: 13px;
    margin: 18px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--parchment-sh);
  }
  .codex-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .codex-combo {
    background: var(--ink-mid);
    border: 1px solid var(--parchment-sh);
    padding: 10px 12px;
    margin-bottom: 6px;
    border-radius: 2px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .codex-combo .name {
    font-family: 'Cinzel Decorative', serif;
    color: var(--gilt);
    font-size: 13px;
    letter-spacing: 0.08em;
  }
  .codex-combo .glyphs {
    font-family: 'JetBrains Mono', monospace;
    color: var(--parchment-sh);
    font-size: 11px;
  }
  .codex-combo .peak {
    font-family: 'JetBrains Mono', monospace;
    color: var(--crimson);
    font-size: 14px;
    font-weight: 700;
  }
  .codex-rune-locked {
    background: var(--ink-warm);
    border: 1px dashed var(--parchment-sh);
    aspect-ratio: 5/7;
    display: grid; place-items: center;
    color: var(--parchment-sh);
    font-size: 24px;
    opacity: 0.4;
  }

  /* ============ MAP / PATH SCREEN ============ */
  .map-path {
    display: flex; flex-direction: column;
    gap: 16px;
    margin-top: 20px;
  }
  .map-node {
    background: var(--ink-mid);
    border: 1px solid var(--parchment-sh);
    padding: 16px;
    border-radius: 3px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s, background 0.2s;
  }
  .map-node.current {
    border-color: var(--gilt);
    background: var(--ink-warm);
    box-shadow: 0 0 20px rgba(212,168,73,0.25);
  }
  .map-node.completed { opacity: 0.4; }
  .map-node.locked { opacity: 0.25; pointer-events: none; }
  .map-node:active:not(.locked):not(.completed) { transform: scale(0.98); }
  .map-node-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--gilt);
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    color: var(--gilt);
    flex-shrink: 0;
  }
  .map-node-icon.boss { border-color: var(--crimson); color: var(--crimson); }
  .map-node-info { flex: 1; }
  .map-node-info .title {
    font-family: 'Cinzel Decorative', serif;
    color: var(--parchment);
    font-size: 14px;
    letter-spacing: 0.08em;
  }
  .map-node-info .sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment-dk);
    font-size: 12px;
  }

  /* ============ VICTORY / DEFEAT ============ */
  .result-screen { text-align: center; padding: 40px 24px; }
  .result-icon {
    font-size: 80px;
    color: var(--gilt);
    margin-bottom: 16px;
    animation: resultEnter 0.8s cubic-bezier(0.2, 0.6, 0.3, 1.2);
  }
  .result-icon.defeat { color: var(--crimson); }
  @keyframes resultEnter {
    0% { opacity: 0; transform: scale(0.3) rotate(-10deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }

  /* ============ SCROLLBAR ============ */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ink-deep); }
  ::-webkit-scrollbar-thumb { background: var(--parchment-sh); }

  /* ============ COMBO BANNER ============ */
  .combo-banner {
    position: fixed;
    top: 35%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--ink-deep);
    border: 1px solid var(--gilt);
    padding: 16px 32px;
    z-index: 90;
    text-align: center;
    pointer-events: none;
    animation: comboBanner 1.6s ease-out forwards;
    box-shadow: 0 0 40px var(--gilt);
  }
  @keyframes comboBanner {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    30% { transform: translate(-50%, -50%) scale(1); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }
  .combo-banner .label {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--parchment-dk);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .combo-banner .name {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    color: var(--gilt-bright);
    font-size: 24px;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .combo-banner.new::after {
    content: 'INSCRIBED';
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--verdigris);
    letter-spacing: 0.3em;
    margin-top: 6px;
  }
  /* a heavier banner for a brand-new or high-magnitude fusion */
  .combo-banner.big {
    border-color: var(--gilt-bright);
    box-shadow: 0 0 60px var(--gilt-bright), 0 0 120px rgba(168,50,50,0.35);
  }
  .combo-banner.big .name { font-size: 30px; color: #ffe6a0;
    text-shadow: 0 0 18px var(--gilt-bright); }

  /* ----- Juice: tap targets (44px min) + reduced-motion ----- */
  button.btn.small { min-height: 44px; }
  button.btn.icon  { min-height: 44px; min-width: 44px; }
  .spell-slot, .rune { -webkit-tap-highlight-color: transparent; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
    .enemy-portrait.hit { animation: none; }
    .damage-pop { animation: none; opacity: 1; }
    #gf-screen-flash { display: none !important; }
  }
</style>
</head>
<body>
<div id="gf-screen-flash" aria-hidden="true"></div>
<div id="app">

  <!-- ============ TITLE ============ -->
  <section id="title-screen" class="screen active">
    <div class="title-mark placeholder" data-art-slot="title-mark">
      <!-- Claude Code: swap in art-slots/title-mark.png (1024x1024) -->
    </div>
    <h1 class="title">Glyph Forge</h1>
    <p class="subtitle">A codex of bound sigils, awaiting their first inscription.</p>
    <div class="title-meta" id="title-meta"></div>
    <div class="menu-buttons">
      <button class="btn primary" id="btn-new-run">Begin Inscription</button>
      <button class="btn" id="btn-continue">Continue</button>
      <button class="btn" id="btn-codex">The Codex</button>
      <button class="btn small" id="btn-daily">Daily Sigil</button>
      <button class="btn small" id="btn-howto">How to Play</button>
      <button class="btn small" id="btn-mute">🔊 Sound</button>
    </div>
    <a id="gf-itch-link" class="gf-itch-link" href="#" target="_blank" rel="noopener" hidden>Pay-what-you-want on itch.io ↗</a>
  </section>

  <!-- ============ MAP / PATH ============ -->
  <section id="map-screen" class="screen">
    <div class="codex-header">
      <h2>The Path</h2>
      <button class="btn icon" id="btn-back-title">✕</button>
    </div>
    <p style="font-family: 'IM Fell English', serif; font-style: italic; color: var(--parchment-dk); text-align: center;">
      Thirteen sigils stand between you and the Sovereign.
    </p>
    <div class="map-path" id="map-path"></div>
  </section>

  <!-- ============ GAME / COMBAT ============ -->
  <section id="game-screen" class="screen">
    <div class="hud">
      <div class="hud-left">
        <span class="hud-stat">⚔ <strong id="hud-encounter">1</strong>/13</span>
        <div class="hp-bar"><div id="hud-hp-fill" style="width: 100%"></div></div>
        <span class="hud-stat">♥ <strong id="hud-hp">50</strong></span>
        <span class="hud-stat fluency-stat" id="hud-fluency-wrap" data-tip="Fluency — each defeated enemy boosts spell damage by +6% (up to +72%)">✦ <strong id="hud-fluency">×1.00</strong></span>
      </div>
      <div class="hud-right">
        <button class="btn icon small" id="btn-mute-hud" aria-label="Toggle sound">🔊</button>
        <button class="btn icon small" id="btn-flee">⌫</button>
      </div>
    </div>
    <div class="hud-depth" id="hud-depth"></div>

    <div class="enemy-stage" id="enemy-stage">
      <div class="enemy">
        <div class="enemy-portrait placeholder" id="enemy-portrait"
             data-art-slot="enemy-{id}">
        </div>
        <div class="enemy-name" id="enemy-name">—</div>
        <div class="enemy-hp-row">
          <div class="enemy-hp-bar"><div id="enemy-hp-ghost" style="width: 100%"></div><div id="enemy-hp-fill" style="width: 100%"></div></div>
          <span id="enemy-hp-text">0/0</span>
        </div>
        <div class="threat-meter" id="threat-meter"></div>
      </div>
    </div>

    <div class="spell-area">
      <div class="spell-readout">
        <span id="spell-formula" style="font-family: 'JetBrains Mono', monospace; font-size: 11px;">—</span>
        <span class="spell-damage" id="spell-damage">0</span>
      </div>
      <div class="spell-slots" id="spell-slots">
        <div class="spell-slot" data-slot="0">I</div>
        <div class="spell-slot" data-slot="1">II</div>
        <div class="spell-slot" data-slot="2">III</div>
      </div>
    </div>

    <div class="hand-area">
      <div class="hand-label">
        <span>Hand</span>
        <span id="deck-info">deck: 0 / discard: 0</span>
      </div>
      <div class="hand-grid" id="hand-grid"></div>
    </div>

    <div class="cast-row">
      <button class="btn" id="btn-clear">Recall</button>
      <button class="btn cast" id="btn-cast" disabled>Inscribe</button>
    </div>
  </section>

  <!-- ============ CODEX ============ -->
  <section id="codex-screen" class="screen">
    <div class="codex-header">
      <h2>The Codex</h2>
      <button class="btn icon" id="btn-codex-back">✕</button>
    </div>
    <div class="codex-stats" id="codex-stats"></div>
    <div class="codex-section-title">Discovered Fusions</div>
    <div id="codex-combos"></div>
    <div class="codex-section-title">Bound Glyphs</div>
    <div class="codex-grid" id="codex-runes"></div>
  </section>

</div>

<!-- ============ MODALS ============ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-content"></div>
</div>

<!-- ============ TOOLTIP ============ -->
<div class="tooltip" id="tooltip" style="display:none"></div>

<script>
/* ================================================================
   GLYPH FORGE — game logic
   Stack: vanilla JS, no deps. Single file. PWA-ready.
   Persistence: localStorage (key = 'glyph-forge-v1').
   ================================================================ */

/* ----- 0. AUDIO — zero-dependency synthesized SFX -----
   No asset files, no libraries: a tiny Web Audio synth. INERT in Node — both
   test.js and sim-run.js stub `window` without AudioContext, so `AC` is falsy,
   the IIFE returns no-ops, and nothing is constructed at load (tests stay
   green). Mute preference persists under its OWN key 'gf-muted'; the save
   schema 'glyph-forge-v1' is never touched (additive discipline). */
const GFAudio = (function(){
  const AC = (typeof window !== 'undefined') && (window.AudioContext || window.webkitAudioContext);
  const NOOP = { cast(){}, combo(){}, reward(){}, hit(){}, victory(){}, defeat(){},
                 tap(){}, toggleMute(){return false;}, isMuted(){return false;}, _unlock(){} };
  if(!AC) return NOOP;

  let ctx = null, master = null, muted = false;
  try { muted = localStorage.getItem('gf-muted') === '1'; } catch(e){}

  function ensure(){
    if(ctx){ if(ctx.state === 'suspended') ctx.resume(); return ctx; }
    try {
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.30;
      master.connect(ctx.destination);
    } catch(e){ ctx = null; }
    return ctx;
  }
  function tone(freq, t0, dur, type, peak){
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak || 0.4, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function sweep(f1, f2, t0, dur, type, peak){
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(f1, t0);
    o.frequency.exponentialRampToValueAtTime(f2, t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak || 0.4, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }
  function noise(t0, dur, peak){
    const n = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate), d = buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = (Math.random()*2-1) * (1 - i/n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(peak || 0.35, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1700;
    src.connect(lp); lp.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur + 0.02);
  }
  function arp(freqs, step, type, peak){
    const t = ctx.currentTime;
    freqs.forEach((f,i)=> tone(f, t + i*step, step*1.7, type, peak));
  }
  const guard = fn => function(){ if(muted || !ensure()) return; try { fn.apply(null, arguments); } catch(e){} };

  const api = {
    tap:    guard(()=>{ tone(420, ctx.currentTime, 0.05, 'triangle', 0.16); }),
    cast:   guard((crit)=>{ const t = ctx.currentTime;
                  sweep(crit?320:255, crit?920:600, t, 0.22, 'sawtooth', 0.32);
                  if(crit) tone(1320, t+0.10, 0.18, 'sine', 0.22); }),
    combo:  guard((isNew)=>{ arp(isNew?[523,659,784,1047]:[523,659,784], 0.07, 'square', 0.24); }),
    reward: guard(()=>{ arp([392,523,659,784], 0.08, 'sine', 0.28); }),
    hit:    guard((crit)=>{ const t = ctx.currentTime;
                  noise(t, crit?0.22:0.13, crit?0.46:0.30);
                  tone(crit?90:130, t, 0.12, 'square', 0.22); }),
    victory:guard(()=>{ arp([523,659,784,1047,1319], 0.12, 'sine', 0.32); }),
    defeat: guard(()=>{ const t = ctx.currentTime;
                  sweep(330, 70, t, 0.9, 'sawtooth', 0.32); tone(110, t, 0.9, 'sine', 0.18); }),
    toggleMute(){ muted = !muted; try { localStorage.setItem('gf-muted', muted?'1':'0'); } catch(e){}
                  if(!muted) ensure(); return muted; },
    isMuted(){ return muted; },
    _unlock(){ if(!muted) ensure(); },
  };
  if(typeof window !== 'undefined' && window.addEventListener){
    const unlock = ()=>{ api._unlock();
      window.removeEventListener('pointerdown', unlock);
      window.removeEventListener('keydown', unlock); };
    window.addEventListener('pointerdown', unlock);
    window.addEventListener('keydown', unlock);
  }
  return api;
})();

/* ----- 0b. JUICE HELPERS — motion/haptic, Node-safe -----
   gfReducedMotion(): honour the OS "reduce motion" setting (and go quiet in
   Node, where matchMedia is absent). gfHaptic(): a guarded vibrate — silent
   on desktop / unsupported / reduced-motion. Both are pure no-ops in the
   test/sim stubs (no window.matchMedia, no navigator.vibrate). */
function gfReducedMotion(){
  try { return typeof window !== 'undefined' && window.matchMedia
    && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
  catch(e){ return false; }
}
function gfHaptic(ms){
  try { if(gfReducedMotion()) return;
    if(typeof navigator !== 'undefined' && navigator.vibrate) navigator.vibrate(ms||10); }
  catch(e){}
}

function ensureRunDepth(run){
  if(!run) return;
  if(!run.relics) run.relics = [];
  if(run.sigil === undefined) run.sigil = 'free';
  if(run.champion === undefined) run.champion = null;
  // backfill progression sub-keys (old mid-run saves may lack some) — C1 fix
  if(!run.progression) run.progression = {};
  const _p = run.progression;
  if(!_p.bound) _p.bound = [];
  if(!_p.revealed) _p.revealed = [];
  if(_p.prophecy === undefined) _p.prophecy = null;
  if(!_p.transmuted) _p.transmuted = [];
  if(!_p._boundIds) _p._boundIds = [];
  if(!run.boundElements) run.boundElements = [];
  if(typeof run.castCount !== 'number') run.castCount = 0;
}
function sigilOf(run){ return SIGILS.find(s=>s.id===(run&&run.sigil))||SIGILS[0]; }
// Depth hooks merged into the spell pipeline. 'pre' runs before the tally
// (POWER edits); 'post' runs after element/shape synergy (XMULT edits).
function applyDepth(ctx, run, phase){
  ensureRunDepth(run);
  const sg = sigilOf(run);
  if(phase==='pre'){
    ctx.runes.forEach((r,i)=>{ if(r && sg.forbid && sg.forbid.includes(r.element)) ctx.runeMod[i].mult = 0; });
    RELICS.forEach(rel=>{ if(run.relics.includes(rel.id) && (rel.phase||'pre')==='pre'){ try{ rel.hook(ctx); }catch(e){} } });
  } else {
    if(sg.boon){ try{ sg.boon(ctx); }catch(e){} }
    if(run.champion && CHAMPIONS[run.champion.id]){
      try{ CHAMPIONS[run.champion.id].apply(ctx, run.champion.level||1, run.champion.path||0); }catch(e){}
    }
    RELICS.forEach(rel=>{ if(run.relics.includes(rel.id) && rel.phase==='post'){ try{ rel.hook(ctx); }catch(e){} } });
    // Phase 6: counter-boss — the Sovereign "reads" your dominant pattern and
    // dampens a mono-element triple, forcing a second viable line for the climax.
    const node = run.path && run.path[run.encounterIdx];
    if(node && node.enemyId==='sovereign' && ctx._maxEl>=3) ctx.xmult *= 0.6;
  }
}

// Phase 5: called from cast() once a spell resolves. Binds elements, fires
// hidden transmutations, and resolves the run prophecy.
function onSpellBound(run, present, result){
  ensureRunDepth(run);
  present.forEach(r=>{ if(r && !run.boundElements.includes(r.element)) run.boundElements.push(r.element); });
  const boundIds = new Set([...(run.progression._boundIds||[]), ...present.map(r=>r.id)]);
  run.progression._boundIds = [...boundIds];
  TRANSMUTATIONS.forEach(tx=>{
    if(run.progression.transmuted.includes(tx.id)) return;
    if(tx.members.every(m=>boundIds.has(m))){
      run.progression.transmuted.push(tx.id);
      if(!run.relics.includes(tx.id)) run.relics.push(tx.id);
      showComboBanner('TRANSMUTED · ' + tx.name, true);
    }
  });
  const pr = run.progression.prophecy;
  if(pr && !pr.done && result.comboMatch && result.comboMatch.id===pr.id){
    pr.done = true;
    run.hp = Math.min(run.maxHp, run.hp + 12);
    showComboBanner('PROPHECY FULFILLED · +12 HP', true);
  }
}
function prophecyPick(run, rng){
  // Daily runs must be reproducible from the seed ALONE — never filter by
  // cross-run meta (would desync players on the same daily seed). H5 fix.
  const isDaily = run && typeof run.seed === 'string' && /^daily-/.test(run.seed);
  let poolP = NAMED_COMBOS;
  if(!isDaily){
    const undiscovered = NAMED_COMBOS.filter(c=>!state.meta.discoveredCombos[c.id]);
    if(undiscovered.length) poolP = undiscovered;
  }
  const c = poolP[Math.floor((rng?rng():Math.random()) * poolP.length)];
  return c ? { id:c.id, name:c.name, done:false } : null;
}

/* ----- 4. RNG (seeded) ----- */
function mulberry32(seed){
  let s = seed >>> 0;
  return function(){
    s = (s + 0x6D2B79F5) | 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function hashString(s){
  let h = 1779033703 ^ s.length;
  for(let i=0;i<s.length;i++){
    h = Math.imul(h ^ s.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return h;
}

  { t:3, name:'Deeper Inscription III',blurb:'The ink replenishes less (heal 8→5).',  bossHp:1.20, enemyHp:1.00, threat:1, heal:5, hp:0 },
  { t:4, name:'Deeper Inscription IV',blurb:'All foes harden (+10% HP) & the Sovereign swells (+44%).', bossHp:1.44, enemyHp:1.10, threat:1, heal:5, hp:0 },
  { t:5, name:'The Unwritten',        blurb:'You begin frailer (−6 max HP).',         bossHp:1.44, enemyHp:1.10, threat:1, heal:5, hp:-6 },
];
function ascById(t){ return ASCENSIONS[Math.max(0, Math.min(ASCENSIONS.length-1, t|0))] || ASCENSIONS[0]; }

/* ----- 5. STATE ----- */
const SAVE_KEY = 'glyph-forge-v1';
let state = loadState();

function defaultState(){
  return {
    meta: {
      discoveredRunes: RUNES.filter(r=>r.starter).map(r=>r.id),
      discoveredCombos: {},      // id -> { name, peakDamage, runeIds, firstSeen }
      runeUseCount: {},          // id -> int
      runsCompleted: 0,
      runsAttempted: 0,
      bestRun: 0,
      seenIntro: false,
      // ---- meta-progression (additive; old saves merge-default in) ----
      ascension: 0,            // highest UNLOCKED Ascension tier
      ascensionBeaten: 0,      // highest tier cleared 13/13
      sigilWins: {},           // sigilId -> 13/13 win count
      daily: { lastDate:null, streak:0, bestStreak:0, scores:{} },
      mastery: { seals:[] },   // earned milestone seal ids
    },
    run: null,
  };
}
function loadState(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed, meta: { ...defaultState().meta, ...parsed.meta } };
  } catch { return defaultState(); }
}
function saveState(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch {}
}

/* ----- 6. RUN INIT ----- */
function startNewRun(seedStr, sigilId, asc){
  const sg = SIGILS.find(s=>s.id===sigilId) || SIGILS[0];
  const A = ascById(asc || 0);
  const seed = hashString(seedStr || (Date.now() + ':' + Math.random()));
  const rng = mulberry32(seed);

  const starterDeck = RUNES.filter(r => r.starter).map(r => r.id);
  // shuffle starter deck
  for(let i=starterDeck.length-1; i>0; i--){
    const j = Math.floor(rng() * (i+1));
    [starterDeck[i], starterDeck[j]] = [starterDeck[j], starterDeck[i]];
  }

  // generate path of 13 encounters
  const path = [];
  for(let i=0; i<13; i++){
    const isBoss = i === 12;
    if(isBoss){
      path.push({ type:'enemy', enemyId:'sovereign', completed:false });
    } else {
      let tier;
      if(i < 3) tier = 1;
      else if(i < 7) tier = 2;
      else tier = 3;
      const candidates = ENEMIES.filter(e => e.tier === tier && !e.boss);
      const enemy = candidates[Math.floor(rng() * candidates.length)];
      path.push({ type:'enemy', enemyId: enemy.id, completed:false });
    }
  }

  state.run = {
    seed: seedStr || String(seed),
    rngSeed: seed,
    encounterIdx: 0,
    hp: Math.max(1, (sg.maxHp || 50) + A.hp),
    maxHp: Math.max(1, (sg.maxHp || 50) + A.hp),
    asc: A.t,
    healAmt: A.heal,
    threatBonus: A.threat,
    bossHpMult: A.bossHp,
    enemyHpMult: A.enemyHp,
    deck: starterDeck.slice(),
    hand: [],
    discard: [],
    spell: [null, null, null],
    path,
    currentThreat: 0,
    enemyHp: 0,
    enemyMaxHp: 0,
    burns: 0,
    stunNext: false,
    fluency: 0,
    // ---- Depth (Phases 3-6) ----
    sigil: sg.id,
    relics: [],
    champion: sg.champion ? { id: sg.champion, level: 1, path: 0 } : null,
    progression: { bound:[], revealed:[], prophecy:null, transmuted:[] },
    boundElements: [],
    castCount: 0,
  };
  state.run.progression.prophecy = prophecyPick(state.run, mulberry32(seed + 999));
  state.meta.runsAttempted += 1;
  beginEncounter();
  saveState();
}

function beginEncounter(){
  const run = state.run;
  ensureRunDepth(run);
  const node = run.path[run.encounterIdx];
  const enemy = ENEMIES.find(e=>e.id===node.enemyId);
  // scale boss / late enemies slightly with progression
  const scale = 1 + (run.encounterIdx * 0.05);
  // Ascension: boss/enemy HP mult + threat bonus (default-neutral at tier 0,
  // and for any pre-Ascension saved run resumed mid-flight).
  const hpMult = enemy.boss ? (run.bossHpMult || 1) : (run.enemyHpMult || 1);
  run.enemyHp = Math.floor(enemy.hp * scale * hpMult);
  run.enemyMaxHp = run.enemyHp;
  run.currentThreat = enemy.threat + (run.threatBonus || 0);
  run.spell = [null, null, null];
  run.burns = 0;
  run.stunNext = false;
  // restore HP between encounters (the ink replenishes; less at high Ascension)
  if(run.encounterIdx > 0){
    run.hp = Math.min(run.maxHp, run.hp + (run.healAmt == null ? 8 : run.healAmt));
  }
  // refill hand to 5
  while(run.hand.length < 5 && (run.deck.length > 0 || run.discard.length > 0)){
    drawOne();
  }
  saveState();
  renderGame();
}

function drawOne(){
  const run = state.run;
  if(run.deck.length === 0){
    // reshuffle discard
    run.deck = run.discard.slice();
    run.discard = [];
    const rng = mulberry32(run.rngSeed + run.encounterIdx*1000 + run.hand.length);
    for(let i=run.deck.length-1; i>0; i--){
      const j = Math.floor(rng()*(i+1));
      [run.deck[i], run.deck[j]] = [run.deck[j], run.deck[i]];
    }
  }
  if(run.deck.length > 0) run.hand.push(run.deck.shift());
}

/* ----- 7. SPELL RESOLUTION -----
   Builds a context, runs each rune's effect, accumulates final damage.
*/
function resolveSpell(){
  const run = state.run;
  const runeObjs = run.spell.map(id => id ? { ...RUNES.find(r=>r.id===id) } : null);
  const present = runeObjs.filter(Boolean);
  if(present.length === 0) return null;

  // favorite rune so far
  const usageCounts = state.meta.runeUseCount;
  let favoriteRune = null;
  let favCt = -1;
  Object.entries(usageCounts).forEach(([k,v])=>{ if(v > favCt){ favCt = v; favoriteRune = k; }});

  const enemyTag = ENEMIES.find(e=>e.id===run.path[run.encounterIdx].enemyId).tag;

  // context: modifiers per rune slot
  const ctx = {
    runes: runeObjs,
    runeMod: runeObjs.map(()=>({ mult:1, add:0, repeats:1, lifesteal:0 })),
    globalMult: 1,
    xmult: 1,          // Phase 2: multiplicative payoff track (synergy + order-dependent runes)
    xmultScaleBoost: 1,// Phase 3: relics can amplify order-dependent rune scaling
    _maxEl: 0, _runeCt: 0,
    healSelf: 0,
    bonusDraw: 0,
    spellRetrigger: 0,
    pandemonium: false,
    burnNext: 0,
    stun: false,
    ignoreWard: false,
    trueDamage: false,
    enemyTag,
    hp: run.hp, maxHp: run.maxHp,
    hand: run.hand.slice(),
    deck: run.deck.slice(),
    rng: mulberry32(run.rngSeed + run.encounterIdx*7919 + (run.castCount||0)),
    meta: { favoriteRune },
  };

  // Phase 3/4: relics + sigil seal + pre-tally hooks
  applyDepth(ctx, run, 'pre');

  // pass 1: each rune applies its effect in order
  runeObjs.forEach((r,i)=>{
    if(r && r.effect) r.effect(ctx, i);
  });

  // H2 fix: re-apply the Sigil seal AFTER effects, so mirror/sympathy that
  // mutate a rune INTO a forbidden element are correctly nulled (and a rune
  // mutated OUT of the forbidden element is no longer wrongly sealed).
  (function(){
    const _sgF = sigilOf(run);
    if(_sgF && _sgF.forbid && _sgF.forbid.length){
      ctx.runes.forEach((r,i)=>{
        if(r && _sgF.forbid.includes(r.element)) ctx.runeMod[i].mult = 0;
        else if(r && ctx.runeMod[i].mult === 0 && !_sgF.forbid.includes(r.element)) ctx.runeMod[i].mult = 1;
      });
    }
  })();

  // pass 2 (if pandemonium): hand runes contribute their basePower
  let pandemoniumBonus = 0;
  if(ctx.pandemonium){
    run.hand.forEach(id=>{
      const r = RUNES.find(x=>x.id===id);
      if(r) pandemoniumBonus += r.basePower;
    });
  }

  // element synergy
  const elementCounts = {};
  ctx.runes.forEach(r=>{ if(r) elementCounts[r.element] = (elementCounts[r.element]||0)+1; });
  const maxEl = Math.max(0, ...Object.values(elementCounts));
  // Phase 2: synergy is now EXPONENTIAL and feeds the XMULT track, so
  // committing to one element/shape scales multiplicatively (build identity).
  const elementMult = maxEl >= 3 ? 3.0 : maxEl === 2 ? 1.6 : 1;

  // shape resonance
  const shapeCounts = {};
  ctx.runes.forEach(r=>{ if(r) shapeCounts[r.shape] = (shapeCounts[r.shape]||0)+1; });
  const maxSh = Math.max(0, ...Object.values(shapeCounts));
  const shapeMult = maxSh >= 3 ? 2.0 : maxSh === 2 ? 1.3 : 1;

  ctx.xmult *= elementMult * shapeMult;
  ctx._maxEl = maxEl; ctx._maxSh = maxSh; ctx._runeCt = present.length;
  // Phase 3/4: sigil boon + champion + post-synergy relics (XMULT track)
  applyDepth(ctx, run, 'post');

  // damage tally
  let totalDamage = 0;
  let totalLifesteal = 0;
  let _baseBefore = 0;   // Phase 2: power assembled in EARLIER slots (order matters)
  const _tr = [];
  ctx.runes.forEach((r,i)=>{
    if(!r) return;
    const mod = ctx.runeMod[i];
    // Order-dependent XMULT: a rune's payoff scales off everything inscribed
    // before it, so placement (slot I/II/III) is a skill expression.
    if(r.xmultScale) ctx.xmult *= 1 + _baseBefore * r.xmultScale * (ctx.xmultScaleBoost||1);
    if(r.xmultFlat)  ctx.xmult *= r.xmultFlat;
    const perRune = (r.basePower + mod.add) * mod.mult;
    const repeatedDmg = perRune * Math.max(1, mod.repeats);
    totalDamage += repeatedDmg;
    _baseBefore += repeatedDmg;
    if(mod.lifesteal > 0) totalLifesteal += repeatedDmg * mod.lifesteal;
    _tr.push({ id:r.id, name:r.name, base:r.basePower, add:mod.add, mult:mod.mult, repeats:Math.max(1,mod.repeats), sub:repeatedDmg });
  });

  // pandemonium adds hand-rune base power
  totalDamage += pandemoniumBonus;
  const _baseSum = totalDamage;

  totalDamage *= ctx.globalMult;
  totalDamage *= ctx.xmult;            // Phase 2: the multiplicative payoff track
  const _spellRetrigger = ctx.spellRetrigger;
  if(ctx.spellRetrigger > 0) totalDamage *= (1 + ctx.spellRetrigger);

  // Fluency: the player learns. Each defeated enemy permanently boosts damage by +6%, cap +72%.
  const fluencyMult = 1 + Math.min(0.72, (run.fluency || 0) * 0.06);
  totalDamage *= fluencyMult;
  const _preFloor = totalDamage;
  totalDamage = Math.floor(totalDamage);

  // combo detection
  const comboMatch = findComboName(present);

  return {
    damage: totalDamage,
    healing: ctx.healSelf + Math.floor(totalLifesteal),
    bonusDraw: ctx.bonusDraw,
    stun: ctx.stun,
    burn: ctx.burnNext,
    trueDamage: ctx.trueDamage,
    ignoreWard: ctx.ignoreWard,
    elementMult, shapeMult,
    globalMult: ctx.globalMult,
    xmult: ctx.xmult,
    fluencyMult,
    comboMatch,
    presentRunes: present,
    crit: ctx.xmult * ctx.globalMult >= 3,
    trace: { perRune:_tr, pandemoniumBonus, baseSum:_baseSum, elementMult, shapeMult,
             globalMult:ctx.globalMult, xmult:ctx.xmult, spellRetrigger:_spellRetrigger,
             fluencyMult, preFloor:_preFloor, final:totalDamage },
  };
}

/* preview (no random spending) — used to update damage readout */
function previewSpellDamage(){
  const result = resolveSpell();
  return result ? result.damage : 0;
}

/* ----- 8. CAST ----- */
function cast(){
  const run = state.run;
  const result = resolveSpell();
  if(!result || result.presentRunes.length === 0) return;

  // record rune usage
  result.presentRunes.forEach(r=>{
    state.meta.runeUseCount[r.id] = (state.meta.runeUseCount[r.id]||0) + 1;
  });

  // apply damage to enemy
  run.enemyHp = Math.max(0, run.enemyHp - result.damage);

  // healing
  if(result.healing > 0){
    run.hp = Math.min(run.maxHp, run.hp + result.healing);
  }

  // record combo
  if(result.comboMatch){
    const id = result.comboMatch.id;
    const existing = state.meta.discoveredCombos[id];
    const isNew = !existing;
    state.meta.discoveredCombos[id] = {
      name: result.comboMatch.name,
      peakDamage: Math.max(existing?.peakDamage || 0, result.damage),
      runeIds: result.presentRunes.map(r=>r.id),
      firstSeen: existing?.firstSeen || Date.now(),
    };
    showComboBanner(result.comboMatch.name, isNew, isNew || result.damage >= 120);
    GFAudio.combo(isNew);
  }

  // Phase 5/6: bind elements, fire transmutations/prophecy, advance the
  // deterministic per-run cast counter (replaces Date.now seed entropy).
  onSpellBound(run, result.presentRunes, result);
  run.castCount = (run.castCount || 0) + 1;

  // discard used runes + reset spell
  run.spell.forEach((id,i)=>{
    if(id){
      run.discard.push(id);
    }
  });
  run.spell = [null, null, null];

  // draw bonus
  for(let i=0;i<result.bonusDraw;i++) drawOne();

  // play damage pop
  GFAudio.cast(result.crit);
  showDamage(result.damage, result.crit);

  // enemy reaction
  const stage = document.getElementById('enemy-portrait');
  GFAudio.hit(result.crit);
  stage.classList.add('hit');
  setTimeout(()=>stage.classList.remove('hit'), 420);

  // refill hand to 5
  while(run.hand.length < 5 && (run.deck.length > 0 || run.discard.length > 0)) drawOne();

  saveState();
  renderGame();

  // check victory / next enemy turn
  setTimeout(()=>{
    if(run.enemyHp <= 0){
      onEnemyDefeated();
    } else {
      enemyTurn(result.stun);
    }
  }, 600);
}

function enemyTurn(stunned){
  const run = state.run;
  if(stunned){
    setTimeout(()=>{ saveState(); renderGame(); }, 400);
    return;
  }
  const enemy = ENEMIES.find(e=>e.id===run.path[run.encounterIdx].enemyId);
  // simple attack: deal threat damage (Ascension may add +threat; +2 if the
  // glass-cannon relic is bound)
  let dmg = run.currentThreat || enemy.threat;
  if(run.relics && run.relics.includes('final-page')) dmg += 2;
  run.hp = Math.max(0, run.hp - dmg);
  saveState();
  renderGame();
  if(run.hp <= 0){
    setTimeout(()=>onDefeat(), 600);
  }
}

/* ----- 9. ENCOUNTER OUTCOMES ----- */
function onEnemyDefeated(){
  const run = state.run;
  run.path[run.encounterIdx].completed = true;
  run.fluency = (run.fluency || 0) + 1;
  // award: pick from 3 random runes
  showRewardModal();
}

function onDefeat(){
  GFAudio.defeat();
  const seed = state.run && state.run.seed;
  const reached = state.run ? state.run.encounterIdx + 1 : 1;
  window._gfResult = { seed, reached, won: false };
  const dd = recordDailyResult(seed, reached, false);
  const dailyLine = dd ? `<br><span style="color:var(--gilt)">Daily score ${dailyScore(reached,false)} · ${dd.streak}-day streak 🔥</span>` : '';
  showModal({
    title: 'The Ink Runs Dry',
    body: `You reached encounter ${reached} of 13.${dailyLine}`,
    icon: '✗',
    iconDefeat: true,
    choices: [
      { label: 'Share result', onClick: gfShare },
      ...(GF_LINKS.itch ? [{ label: 'Get the full codex ↗', onClick: gfOpenItch }] : []),
      { label: 'Return to the Codex', onClick: ()=>{ state.run = null; saveState(); showScreen('title-screen'); } }
    ]
  });
}

function onVictory(){
  GFAudio.victory();
  const run = state.run || {};
  const asc = run.asc || 0;
  const isDaily = /^daily-/.test(run.seed || '');
  window._gfResult = { seed: run.seed, reached: 13, won: true, asc };
  state.meta.runsCompleted += 1;
  state.meta.bestRun = Math.max(state.meta.bestRun, 13);
  if(run.sigil) state.meta.sigilWins[run.sigil] = (state.meta.sigilWins[run.sigil] || 0) + 1;
  // Ascension unlock: clearing the highest tier you've reached opens the next.
  // Daily runs are fixed at tier 0 (fair shared seed) and never advance it.
  if(!isDaily){
    state.meta.ascensionBeaten = Math.max(state.meta.ascensionBeaten || 0, asc);
    if(asc >= (state.meta.ascension || 0) && asc + 1 < ASCENSIONS.length){
      state.meta.ascension = asc + 1;
    }
  }
  const newTierUnlocked = !isDaily && asc + 1 < ASCENSIONS.length && (state.meta.ascension === asc + 1);
  const dd = recordDailyResult(run.seed, 13, true);
  state.run = null;
  saveState();
  const ascLine = asc > 0 ? ` <span style="color:var(--crimson)">[${ascById(asc).name}]</span>` : '';
  const unlockLine = newTierUnlocked
    ? `<br><b style="color:var(--gilt-bright)">✦ Unlocked: ${ascById(asc+1).name}</b> — ${ascById(asc+1).blurb}`
    : (dd ? `<br><span style="color:var(--gilt)">Daily score ${dailyScore(13,true)} · ${dd.streak}-day streak 🔥</span>`
          : '');
  showModal({
    title: 'The Sovereign Falls',
    body: `You have inscribed every glyph. The codex is whole.${ascLine}${unlockLine}`,
    icon: '✷',
    choices: [
      { label: 'Share victory', onClick: gfShare },
      ...(GF_LINKS.itch ? [{ label: 'Name your price ↗', onClick: gfOpenItch }] : []),
      { label: 'Begin Anew', onClick: ()=>{ showScreen('title-screen'); } }
    ]
  });
}

/* ----- 10. REWARD MODAL ----- */
function showRewardModal(){
  GFAudio.reward();
  const run = state.run;
  const rng = mulberry32(run.rngSeed + run.encounterIdx * 31);

  // Build a weighted pool of runes from the entire set, biased toward what's not already in deck
  const allOwned = new Set([...run.deck, ...run.hand, ...run.discard, ...run.spell.filter(Boolean)]);

  // tier rule: early = mostly common/uncommon, later = uncommon/rare, last few = rare/mythic
  let pool;
  if(run.encounterIdx < 4){
    pool = RUNES.filter(r => r.rarity === 'common' || r.rarity === 'uncommon');
  } else if(run.encounterIdx < 9){
    pool = RUNES.filter(r => r.rarity === 'uncommon' || r.rarity === 'rare');
  } else {
    pool = RUNES.filter(r => r.rarity === 'rare' || r.rarity === 'mythic');
  }

  // Phase 5: progressive reveal — a deep (rare/mythic) rune only appears once
  // you've BOUND its element this run (cast a spell containing it). Engaging a
  // branch is what reveals the branch (Neon-Abyss). Sigil element is pre-bound.
  ensureRunDepth(run);
  const _bound = new Set([...(run.boundElements||[]), sigilOf(run).element].filter(Boolean));
  pool = pool.filter(r => (r.rarity==='common'||r.rarity==='uncommon') || _bound.has(r.element));

  // Phase 4: curated pool — bias offers toward your Sigil's element so the
  // build identity can actually snowball (StS-style curated pools).
  const _sg = sigilOf(run);
  if(_sg && _sg.element){
    const boost = pool.filter(r=> r.element===_sg.element);
    pool = pool.concat(boost); // ~2x weight for on-identity runes
  }
  if(pool.length < 3) pool = RUNES.filter(r=> r.rarity==='common'||r.rarity==='uncommon'); // safety

  const offered = [];
  while(offered.length < 3 && pool.length > 0){
    const idx = Math.floor(rng() * pool.length);
    const r = pool[idx];
    if(!offered.find(o=>o.id===r.id)){
      offered.push(r);
    }
    pool = pool.filter(x=>x.id !== r.id);
  }

  const isBoss = run.encounterIdx === 12;
  if(isBoss){
    // boss completed = win
    return onVictory();
  }

  const advance = ()=>{ run.encounterIdx += 1; hideModal(); beginEncounter(); };

  // Phase 4: Champion level-up at encounters 4 & 8 (idx 3 & 7)
  if(run.champion && (run.encounterIdx === 3 || run.encounterIdx === 7 || run.encounterIdx === 11)){
    const ch = CHAMPIONS[run.champion.id];
    const ups = CHAMPION_UPS[run.champion.id] || ['Level up (+1)'];
    return renderPickModal(`${ch.name} Awakens`, ch.desc, ups.map((label,i)=>({
      name: label, desc: `Champion level ${ (run.champion.level||1) } → ${ (run.champion.level||1)+1 }`,
      tags: 'champion', onClick: ()=>{ run.champion.level = (run.champion.level||1)+1; run.champion.path = i; advance(); }
    })));
  }

  // Phase 3: Relic offer at encounters 3, 6, 10 (idx 2, 5, 9)
  if([2,5,9].includes(run.encounterIdx)){
    const rrng = mulberry32(run.rngSeed + run.encounterIdx*31 + 777);
    let rpool = RELICS.filter(x=>!x.hidden && !run.relics.includes(x.id) && (x.rarity!=='mythic' || state.meta.runsCompleted>=1));
    const rOffered = [];
    while(rOffered.length < 3 && rpool.length > 0){
      const i = Math.floor(rrng() * rpool.length);
      rOffered.push(rpool[i]); rpool = rpool.filter((_,k)=>k!==i);
    }
    if(rOffered.length){
      return renderPickModal('A Relic Surfaces', 'Bind one. It reshapes every spell for the rest of the run.',
        rOffered.map(rel=>({
          name: rel.name, desc: rel.desc, tags: `relic · ${rel.rarity}`,
          onClick: ()=>{ run.relics.push(rel.id); advance(); }
        })).concat([{ name:'Mend The Vellum', desc:'Skip. Restore 10 HP.', tags:'heal',
          onClick: ()=>{ run.hp = Math.min(run.maxHp, run.hp + 10); advance(); } }]));
    }
  }

  const choices = offered.map(r => ({
    rune: r,
    onClick: ()=>{
      run.deck.push(r.id);
      if(!state.meta.discoveredRunes.includes(r.id)){
        state.meta.discoveredRunes.push(r.id);
      }
      run.encounterIdx += 1;
      hideModal();
      beginEncounter();
    }
  }));
  // also offer "skip + heal" as a fourth option
  choices.push({
    isSkip: true,
    onClick: ()=>{
      run.hp = Math.min(run.maxHp, run.hp + 10);
      run.encounterIdx += 1;
      hideModal();
      beginEncounter();
    }
  });

  renderRewardModal(choices);
}

/* Phase 3/4: generic card-list picker (relics, champion, etc.) */
function renderPickModal(title, subtitle, items){
  const modal = document.getElementById('modal-content');
  modal.innerHTML = `<h2>${title}</h2><p>${subtitle}</p><div class="choices" id="reward-choices"></div>`;
  const list = modal.querySelector('#reward-choices');
  items.forEach(it=>{
    const el = document.createElement('div');

/* ----- 11. RENDER ----- */
function runeCardHTML(rune, small){
  const slotAttr = `data-art-slot="rune-${rune.id}"`;
  return `
    <div class="rune rarity-${rune.rarity}">
      <div class="rune-art placeholder" ${slotAttr} data-glyph="${rune.glyph}">
        <!-- Swap in art-slots/rune-${rune.id}.png -->
      </div>
      ${small ? '' : `<div class="rune-name">${rune.name}</div>`}
      ${small ? '' : `<div class="rune-stats">
        <span><span class="rune-element-dot el-${rune.element.toLowerCase()}"></span>${rune.shape[0]}</span>
        <span class="rune-stat-power">${rune.basePower}</span>
      </div>`}
    </div>
  `;
}

/* ----- ART AUTO-LOADER -----
   On each render, look for [data-art-slot] elements still showing a placeholder
   and attempt to load /art-slots/<slot>.png. If the image loads successfully,
   replace the placeholder content with an <img>. Failed loads are cached so
   we don't retry on every render.
*/
const ART_CACHE = new Map();  // slot -> 'loaded' | 'missing' | 'pending'
function hydrateArt(){
  document.querySelectorAll('[data-art-slot]').forEach(el=>{
    const slot = el.getAttribute('data-art-slot');
    if(!slot || !el.classList.contains('placeholder')) return;
    if(el.querySelector('img')) return;
    const cached = ART_CACHE.get(slot);
    if(cached === 'missing') return;
    if(cached === 'pending') return;
    ART_CACHE.set(slot, 'pending');
    const img = new Image();
    img.onload = ()=>{
      ART_CACHE.set(slot, 'loaded');
      // re-query (the original element may have re-rendered)
      document.querySelectorAll(`[data-art-slot="${slot}"]`).forEach(target=>{
        target.classList.remove('placeholder');
        target.innerHTML = '';
        const ix = new Image();
        ix.src = `art-slots/${slot}.png`;
        target.appendChild(ix);
      });
    };
    img.onerror = ()=>{ ART_CACHE.set(slot, 'missing'); };
    img.src = `art-slots/${slot}.png`;
  });
}

function renderGame(){
  const run = state.run;
  if(!run) return;

  const node = run.path[run.encounterIdx];
  const enemy = ENEMIES.find(e=>e.id===node.enemyId);

  // HUD
  document.getElementById('hud-encounter').textContent = run.encounterIdx + 1;
  document.getElementById('hud-hp').textContent = run.hp;
  document.getElementById('hud-hp-fill').style.width = (100 * run.hp / run.maxHp) + '%';
  const fluencyMult = 1 + Math.min(0.72, (run.fluency || 0) * 0.06);
  document.getElementById('hud-fluency').textContent = '×' + fluencyMult.toFixed(2);
  document.getElementById('deck-info').textContent = `deck: ${run.deck.length} / discard: ${run.discard.length}`;

  // Depth status strip — make Sigil/relics/champion/prophecy/bound legible.
  ensureRunDepth(run);
  const dEl = document.getElementById('hud-depth');
  if(dEl){
    const sg = sigilOf(run);
    const chips = [];
    chips.push(`<span class="dchip" data-tip="${sg.desc||'Your run identity — blesses and forbids.'}">◈ <b>${sg.name}</b></span>`);
    if(run.champion && CHAMPIONS[run.champion.id]){
      chips.push(`<span class="dchip" data-tip="${CHAMPIONS[run.champion.id].desc}">★ ${CHAMPIONS[run.champion.id].name} <b>Lv${run.champion.level||1}</b></span>`);
    }
    const relObjs = (run.relics||[]).map(id=>RELICS.find(x=>x.id===id)).filter(Boolean);
    const pips = relObjs.map(r=>`<i class="rtok r-${r.rarity}"></i>`).join('');
    const relTip = relObjs.length ? relObjs.map(r=>`${r.name} — ${r.desc}`).join(' · ') : 'No relics bound yet.';
    chips.push(`<span class="dchip${relObjs.length?'':' dim'}" data-tip="${relTip}">⬡ relics <b>${relObjs.length}</b>${pips}</span>`);
    const pr = run.progression && run.progression.prophecy;
    if(pr){
      chips.push(`<span class="dchip dprophecy ${pr.done?'done':''}" data-tip="Fulfil the named fusion '${pr.name}' for +12 HP">✦ ${pr.done?'prophecy ✓':'prophecy: '+pr.name}</span>`);
    }
    const bound = (run.boundElements||[]);
    if(bound.length) chips.push(`<span class="dchip dim" data-tip="Elements bound this run unlock their deeper runes">⛓ ${bound.join(' ')}</span>`);
    if(sg.forbid && sg.forbid.length) chips.push(`<span class="dchip dim" data-tip="Sealed by your Sigil — these runes deal 0">⊘ ${sg.forbid.join(' ')}</span>`);
    dEl.innerHTML = chips.join('');
  }

  // Enemy
  document.getElementById('enemy-name').textContent = enemy.name;
  document.getElementById('enemy-hp-text').textContent = `${run.enemyHp}/${run.enemyMaxHp}`;
  const hpPct = (100 * run.enemyHp / run.enemyMaxHp) + '%';
  document.getElementById('enemy-hp-fill').style.width = hpPct;
  const _ghost = document.getElementById('enemy-hp-ghost');
  if(_ghost) _ghost.style.width = hpPct;
  const portrait = document.getElementById('enemy-portrait');
  portrait.setAttribute('data-art-slot', `enemy-${enemy.id}`);
  portrait.setAttribute('data-glyph', enemy.glyph);
  // Threat pips
  const threatMeter = document.getElementById('threat-meter');
  threatMeter.innerHTML = '';
  for(let i=0;i<5;i++){
    const pip = document.createElement('div');
    pip.className = 'threat-pip' + (i < enemy.threat ? ' active' : '');
    threatMeter.appendChild(pip);
  }

  // Spell slots
  const slotsEl = document.getElementById('spell-slots');
  slotsEl.innerHTML = '';
  run.spell.forEach((id, i)=>{
    const slot = document.createElement('div');
    const justFilled = id && _gfPrevSpell[i] !== id;
    slot.className = 'spell-slot' + (id ? ' filled' : '') + (justFilled ? ' gf-fill' : '');
    slot.dataset.slot = i;
    if(id){
      const rune = RUNES.find(r=>r.id===id);
      slot.innerHTML = runeCardHTML(rune);
    } else {
      slot.textContent = ['I','II','III'][i];
    }
    slot.onclick = ()=> handleSlotTap(i);
    slotsEl.appendChild(slot);
  });
  _gfPrevSpell = run.spell.slice();

  // Synergy hints on slots
  const present = run.spell.filter(Boolean).map(id => RUNES.find(r=>r.id===id));
  if(present.length >= 2){
    const elCounts = {};
    const shCounts = {};
    present.forEach(r=>{
      elCounts[r.element] = (elCounts[r.element]||0)+1;
      shCounts[r.shape] = (shCounts[r.shape]||0)+1;
    });
    const hasEl = Object.values(elCounts).some(v=>v>=2);
    const hasSh = Object.values(shCounts).some(v=>v>=2);
    [...slotsEl.children].forEach((sl,i)=>{
      if(!run.spell[i]) return;
      const r = RUNES.find(x=>x.id===run.spell[i]);
      const elMatch = hasEl && elCounts[r.element] >= 2;
      const shMatch = hasSh && shCounts[r.shape] >= 2;
      if(elMatch && shMatch) sl.classList.add('synergy-both');
      else if(elMatch) sl.classList.add('synergy-element');
      else if(shMatch) sl.classList.add('synergy-shape');
    });
  }

  // Spell readout
  const dmg = previewSpellDamage();
  const sdEl = document.getElementById('spell-damage');
  sdEl.textContent = dmg > 0 ? dmg : '—';
  const heat = dmg <= 0 ? 0 : gfDamageTier(dmg);
  sdEl.className = 'spell-damage' + (heat >= 2 ? ' heat-' + heat : '');
  document.getElementById('spell-formula').textContent = formulaText(present);

  // Hand
  const handEl = document.getElementById('hand-grid');
  handEl.innerHTML = '';
  run.hand.forEach((id, i)=>{
    const rune = RUNES.find(r=>r.id===id);
    const card = document.createElement('div');
    card.innerHTML = runeCardHTML(rune);
    const cardEl = card.firstElementChild;
    cardEl.dataset.handIdx = i;
    cardEl.onclick = ()=> handleHandTap(i);
    cardEl.oncontextmenu = (e)=>{ e.preventDefault(); showTooltipFor(cardEl, rune); };
    bindLongPress(cardEl, ()=> showTooltipFor(cardEl, rune));
    handEl.appendChild(cardEl);
  });

  // Cast button
  document.getElementById('btn-cast').disabled = present.length === 0;

  // Try to hydrate any dropped art for runes/enemies
  hydrateArt();
}

function formulaText(runes){
  if(runes.length === 0) return '—';
  return runes.map(r=>{
    const el = r.element[0];
    return `${el}·${r.basePower}`;
  }).join(' + ');
}

function handleHandTap(handIdx){
  const run = state.run;
  const runeId = run.hand[handIdx];
  if(!runeId) return;
  const emptySlot = run.spell.indexOf(null);
  if(emptySlot === -1) return;
  run.spell[emptySlot] = runeId;
  run.hand.splice(handIdx, 1);
  renderGame();
}

function handleSlotTap(slotIdx){
  const run = state.run;
  GFAudio.tap();
  if(run.spell[slotIdx]){
    run.hand.push(run.spell[slotIdx]);
    run.spell[slotIdx] = null;
    renderGame();
  }
}

function clearSpell(){
  state.run.spell.forEach(id => { if(id) state.run.hand.push(id); });
  state.run.spell = [null, null, null];
  renderGame();
}
